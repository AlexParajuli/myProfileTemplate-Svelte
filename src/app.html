<!doctype html>
<html lang="en">
<head>
	<style>
	body{
    display:grid;
    place-items:center;
    min-height:100vh;
    background:#fae1dd;
}

.container{
    position:relative;
}

.valentine{
    position:relative;
    top:50px;
    cursor:pointer;
}

.envelope{
    position:relative;
    width:300px;
    height:200px;
    background:#f08080;
    display:grid;
    place-items:center;
}

.envelope::before{
    content:'';
    position:absolute;
    width:212px;
    height:212px;
    background:#f08080;
    transform:rotate(45deg);
    top:-105px;
    left:44px;
    border-radius:30px 0 0 0;
}

.front{
    position:absolute;
    border-right:180px solid #f4978e;
    border-top:95px solid transparent;
    border-bottom:100px solid transparent;
    left:120px;
    top:5px;
    width:0;
    height:0;
    z-index:10;
}

.front::before{
    position:absolute;
    content:'';
    border-left:300px solid #fda996;
    border-top:195px solid transparent;
    left:-120px;
    top:-95px;
}
	</style>

	<meta charset="utf-8" />
	<link rel="icon" href="%sveltekit.assets%/favicon.png" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	%sveltekit.head% 
</head> 

    <body> 
        %sveltekit.body%

	<div class="container">
		<div class="valentine">
			<div class="envelope"></div>
			<div class="front"></div>
		</div>
	</div>

</body>
</html>
